version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: inventory_db
      POSTGRES_USER: app
      POSTGRES_PASSWORD: '123'
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app -d inventory_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - backend_network

  web:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      - DB_HOST=db
    networks:
      - backend_network

  nginx:
    image: nginx:alpine
    volumes:
      - ./mywebapp.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - web
    networks:
      - backend_network

volumes:
  db_data:

networks:
  backend_network: